<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рыбная Точка</title>

    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #2E4554;
            --navy-light: #3F5A69;
            --beige: #E8E5E1;
            --gold: #c5a059;
            --white: #FFFFFF;
            --text-dark: #2E4554;
            --serif: 'Playfair Display', serif;
            --sans: 'Montserrat', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--navy);
            color: var(--white);
            font-family: var(--sans);
            overflow: hidden;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .container {
            height: calc(100vh - 75px);
            overflow-y: auto;
            padding: 0 15px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }

        .serif { font-family: var(--serif); }

        .brand-header { text-align: center; padding: 25px 0 10px; }
        .brand-header h1 {
            font-family: var(--serif);
            font-size: 24px;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 400;
            text-transform: uppercase;
        }
        .brand-header span { color: var(--gold); }

        .cats-sticky {
            position: sticky;
            top: 0;
            background: var(--navy);
            z-index: 100;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .cats-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 15px;
            scrollbar-width: none;
        }

        .cat-btn {
            white-space: nowrap;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--white);
            opacity: 0.4;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 15px;
            transition: 0.3s;
        }

        .cat-btn.active {
            opacity: 1;
            color: var(--gold);
            background: rgba(197, 160, 89, 0.15);
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding-bottom: 100px;
            margin-top: 10px;
        }

        .card {
            background: var(--beige);
            border-radius: 20px;
            padding: 10px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .p-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 8px;
            background: #ddd;
        }

        .p-name {
            font-family: var(--serif);
            font-size: 13px;
            font-weight: 600;
            min-height: 36px;
            overflow: hidden;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .p-pack {
            font-size: 9px;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            min-height: 22px;
        }

        .p-desc {
            font-size: 10px;
            line-height: 1.3;
            opacity: 0.85;
            min-height: 52px;
            margin-bottom: 8px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .p-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .add-btn {
            background: var(--navy);
            color: var(--white);
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            flex: 1;
        }

        .more-btn {
            background: transparent;
            color: var(--navy);
            border: 1px solid rgba(46,69,84,0.25);
            padding: 10px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            flex: 1;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: 25px 25px 0 0;
            z-index: 1000;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
        }

        .nav-item {
            color: var(--navy);
            text-align: center;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            opacity: 0.4;
            position: relative;
        }

        .nav-item.active {
            opacity: 1;
            font-weight: 700;
            color: var(--gold);
        }

        .nav-item svg {
            display: block;
            margin: 0 auto 4px;
            width: 22px;
            height: 22px;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gold);
            color: var(--navy);
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            background: var(--beige);
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 12px;
            color: var(--text-dark);
            align-items: center;
        }

        .cart-img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            object-fit: cover;
        }

        .cart-ctrl {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid var(--navy);
            background: none;
            font-weight: 700;
            cursor: pointer;
        }

        .profile-card {
            background: var(--navy-light);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            margin-top: 20px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: var(--navy);
            font-family: var(--serif);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .status-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: rgba(197, 160, 89, 0.1);
            color: var(--gold);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .checkout-form {
            margin-top: 30px;
            padding-bottom: 120px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 15px;
            margin-bottom: 12px;
            box-sizing: border-box;
            font-family: var(--sans);
        }

        .btn-order-final {
            width: 100%;
            padding: 20px;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }

        .secondary-btn {
            width: 100%;
            padding: 16px;
            background: rgba(197, 160, 89, 0.12);
            color: var(--gold);
            border: 1px solid rgba(197, 160, 89, 0.25);
            border-radius: 18px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 12px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 24px;
            margin: 24px 0 12px;
            font-family: var(--serif);
        }

        .history-wrap {
            padding-bottom: 120px;
        }

        .history-card {
            background: var(--beige);
            color: var(--text-dark);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .history-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .history-id {
            font-size: 12px;
            font-weight: 700;
            color: var(--navy);
        }

        .history-date {
            font-size: 11px;
            opacity: 0.7;
        }

        .history-total {
            font-size: 14px;
            font-weight: 700;
            color: var(--navy);
            margin-top: 8px;
        }

        .history-status {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(46, 69, 84, 0.08);
            color: var(--navy);
        }

        .admin-panel {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .muted-text {
            opacity: 0.6;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.4;
        }

        .debug-box { display: none; }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-sheet {
            width: 100%;
            max-height: 85vh;
            background: var(--beige);
            color: var(--text-dark);
            border-radius: 24px 24px 0 0;
            padding: 16px 16px 110px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .modal-close {
            width: 100%;
            text-align: right;
            font-size: 14px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
            cursor: pointer;
        }

        .modal-title {
            font-family: var(--serif);
            font-size: 24px;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .modal-pack {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .modal-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 14px;
        }

        .modal-block-title {
            font-family: var(--serif);
            font-size: 18px;
            margin: 16px 0 8px;
            color: var(--navy);
        }

        .modal-text {
            font-size: 13px;
            line-height: 1.55;
            white-space: pre-line;
        }

        .modal-add-btn {
            position: sticky;
            bottom: 0;
            width: 100%;
            padding: 18px;
            background: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 20px;
        }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="shop-view" class="view active">
            <div class="brand-header"><h1>Рыбная <span>Точка</span></h1></div>
            <div class="cats-sticky"><div class="cats-list" id="cat-nav"></div></div>
            <div class="grid" id="product-grid"></div>
        </div>

        <div id="cart-view" class="view">
            <h2 class="serif" style="font-size: 30px; margin: 20px 0;">Ваш заказ</h2>
            <div id="cart-list"></div>
            <div id="cart-empty" style="text-align: center; margin-top: 80px; opacity: 0.5;">Корзина пуста</div>

            <div id="checkout-block" style="display: none;" class="checkout-form">
                <h3 class="serif">Детали доставки</h3>
                <input type="tel" id="f-phone" placeholder="Телефон: +7...">
                <input type="text" id="f-address" placeholder="Адрес: Город, улица, дом">
                <button class="btn-order-final" onclick="finalizeOrder()">Оформить заказ</button>
            </div>
        </div>

        <div id="profile-view" class="view">
            <h2 class="serif" style="font-size: 30px; margin: 20px 0;">Профиль</h2>
            <div class="profile-card">
                <div class="avatar" id="avatar">?</div>
                <div id="user-name" class="serif" style="font-size: 24px;">MAX Клиент</div>
                <div id="user-id" style="opacity: 0.6; font-size: 13px; margin-top: 5px;">@username</div>
                <div class="status-badge" id="user-status">MAX Premium Guest</div>
                <div class="muted-text" id="user-extra"></div>
            </div>

            <div class="admin-panel">
                <h3 class="section-title">Действия</h3>
                <button class="secondary-btn" onclick="exportOrdersCSV()">Скачать CSV на устройство</button>
                <button class="secondary-btn" onclick="sendCsvToAdmin()">Отправить CSV админу</button>
            </div>

            <div class="history-wrap">
                <h3 class="section-title">История заказов</h3>
                <div id="orders-history-empty" style="opacity:0.5; margin-top: 15px;">У вас пока нет заказов</div>
                <div id="orders-history-list"></div>

                <div class="debug-box" id="debug-log">Лог: готово.</div>
            </div>
        </div>
    </div>

    <div class="modal" id="product-modal" onclick="closeProductModal(event)">
        <div class="modal-sheet" id="modal-sheet">
            <div class="modal-close" onclick="forceCloseModal()">Закрыть</div>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-pack" id="modal-pack"></div>
            <div class="modal-price" id="modal-price"></div>
            <div class="modal-block-title">Описание</div>
            <div class="modal-text" id="modal-desc"></div>
            <div class="modal-block-title">КБЖУ</div>
            <div class="modal-text" id="modal-kbju"></div>
            <button class="modal-add-btn" id="modal-add-btn">В корзину</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('shop-view', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Меню
        </div>
        <div class="nav-item" onclick="switchTab('cart-view', this)">
            <div class="badge" id="cart-badge">0</div>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>Заказ
        </div>
        <div class="nav-item" onclick="switchTab('profile-view', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>Профиль
        </div>
    </nav>

    <script>
        const BACKEND_URL = "https://твой-backend-url";

        const STORAGE_CART_KEY = "max_final_cart";
        const STORAGE_ORDERS_KEY = "max_orders_registry";
        const STORAGE_USERS_KEY = "max_users_registry";

        const app = window.WebApp || null;

        if (app && typeof app.ready === "function") {
            try { app.ready(); } catch (e) {}
        }

        const PRODUCTS = [
            {
                        "id": 1,
                        "cat": "Рыба целая и стейки",
                        "name": "Форель морская потрошеная, 2-3 кг (Инарктика)",
                        "price": 1200,
                        "pack": "От одной рыбы",
                        "desc": "Производитель Инарктика (№1 в России по выращиванию форели и лосося). Высочайший стандарт качества и экологичности.\nКрупный калибр (2-3 кг) означает идеальный баланс жира и нежного мяса. Рекордное содержание Омега-3, витамина D, фосфора и селена.\nУкрепляет сердце, улучшает работу мозга, дарит здоровую кожу и заряжает энергией.\nПотрошеная, внутри чисто — минимум хлопот. Шоковая заморозка рыбы сразу после разделки = свежесть только что выловленной рыбки стоит на паузе до дефростации.",
                        "kbju": "Калорийность: 190 ккал\n\nБелки: 20 г\n\nЖиры: 12 г\n\nУглеводы: 0 г"
            },
            {
                        "id": 2,
                        "cat": "Рыба целая и стейки",
                        "name": "Форель Карельская потрошенная, 2-3 кг (Инарктика)",
                        "price": 1050,
                        "pack": "От одной рыбы",
                        "desc": "Производитель Инарктика — выращена в чистых пресных водах Карелии. Экологичное производство, высший стандарт качества.\n\nВ отличие от морской, карельская форель имеет более нежную и мягкую текстуру мяса, менее насыщенный жировой прослойкой, но при этом очень сочный и деликатный вкус. Калибр 2-3 кг — оптимальный для сочности и удобства приготовления.\nБогата витамином D, витаминами группы B, фосфором (для костей и мозга) и селеном. Содержит полезные жиры Омега-3, необходимые для здоровья сердца и сосудов.\nЛегкое усвоение, поддержка иммунитета и отличное настроение.\nПотрошеная — идеальна для запекания целиком, ухи или нежных стейков на пару. Шоковая заморозка сразу посл разделки рыбы гарантирует вам свежесть только что выловленной рыбы на вашем столе.",
                        "kbju": "КБЖУ на 100 грамм:\n\nКалорийность: 150-160 ккал\n\nБелки: 20 г\n\nЖиры: 8 г\n\nУглеводы: 0 г"
            },
            {
                        "id": 3,
                        "cat": "Рыба целая и стейки",
                        "name": "Скумбрия атлантическая крупная неразделанная, 500+",
                        "price": 630,
                        "pack": "От двух рыб",
                        "desc": "Промысел в открытых водах Атлантического океана, Фарерские острова. \nСкумбрия — жирная, плотная, ароматная. Калибр 500+ означает, что рыба нагуляла идеальный вес и жирок. В неразделанном виде она максимально сохраняет сочность при запекании и идеальна для домашнего копчения или гриля. Рекордсмен по содержанию жирных кислот Омега-3 (выше, чем у лосося!). Богата витамином D (особенно важным в пасмурные дни), витамином B12 и ценнейшим микроэлементом селеном.\nПоддержка сердца и сосудов, крепкий иммунитет, здоровая кожа и отличное настроение даже зимой. Атлантическая скумбрия отличается более высоким содержанием полезных жиров по сравнению с тихоокеанской. Это лучший выбор для тех, кто хочет получить максимум Омега-3 из доступной рыбы.",
                        "kbju": "КБЖУ на 100 грамм:\n\nКалорийность: 190–200 ккал\n\nБелки: 18 г\n\nЖиры: 13–18 г (в зависимости от сезона вылова, осенью — максимальная жирность)\n\nУглеводы: 0 г"
            },
            {
                        "id": 4,
                        "cat": "Рыба целая и стейки",
                        "name": "Сибас 400-600 гр (Турция)",

        function logDebug(text, obj = null) {
            const box = document.getElementById("debug-log");
            if (!box) return;
            const line = `[${new Date().toLocaleTimeString("ru-RU")}] ${text}`;
            let payload = "";
            if (obj !== null) {
                try {
                    payload = "\n" + JSON.stringify(obj, null, 2);
                } catch (e) {
                    payload = "\n" + String(obj);
                }
            }
            box.textContent = line + payload;
            console.log(line, obj ?? "");
        }

        function escapeHTML(str) {
            return String(str ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeCSV(value) {
            const str = String(value ?? "");
            return `"${str.replace(/"/g, '""')}"`;
        }

        function formatDate(dateString) {
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString;
            return d.toLocaleString("ru-RU", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

                "Консервы": "https://images.unsplash.com/photo-1547592180-85f173990554?w=300",
                "Снеки и закуски": "https://images.unsplash.com/photo-1534939561126-855b8675edd7?w=300"
            };
            return map[category] || "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=300";
        }

        function getUserFromMaxWebApp() {
            const rawUser = app?.initDataUnsafe?.user || null;

            if (rawUser && rawUser.id) {
                return {
                    id: String(rawUser.id),
                    first_name: rawUser.first_name || "MAX",
                    last_name: rawUser.last_name || "",
                    username: rawUser.username || "",
                    photo_url: rawUser.photo_url || "",
                    language_code: rawUser.language_code || "ru"
                };
            }

            return {
                id: "guest_local",
                first_name: "MAX",
                last_name: "Клиент",
                username: "guest",
                photo_url: "",
                language_code: "ru"
            };
        }

        function getUserDisplayName(user) {
            return [user.first_name, user.last_name].filter(Boolean).join(" ").trim() || "MAX Клиент";
        }

        function getUserTag(user) {
            return user.username ? "@" + user.username : "id" + user.id;
        }

        function getUserStorageKey(userId) {
            return `max_orders_user_${userId}`;
        }

        function saveUserProfile(user) {
            const users = JSON.parse(localStorage.getItem(STORAGE_USERS_KEY)) || {};
            users[user.id] = {
                id: user.id,
                first_name: user.first_name,
                last_name: user.last_name,
                username: user.username,
                photo_url: user.photo_url,
                language_code: user.language_code,
                last_seen_at: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_USERS_KEY, JSON.stringify(users));
        }

        function getAllOrders() {
            return JSON.parse(localStorage.getItem(STORAGE_ORDERS_KEY)) || [];
        }

        function setAllOrders(orders) {
            localStorage.setItem(STORAGE_ORDERS_KEY, JSON.stringify(orders));
        }

        function getUserOrders(userId) {
            return JSON.parse(localStorage.getItem(getUserStorageKey(userId))) || [];
        }

        function setUserOrders(userId, orders) {
            localStorage.setItem(getUserStorageKey(userId), JSON.stringify(orders));
        }

        function generateOrderId() {
            const part1 = Date.now().toString(36).toUpperCase();
            const part2 = Math.random().toString(36).slice(2, 6).toUpperCase();
            return `MAX-${part1}-${part2}`;
        }

        function buildOrdersCSV() {
            const orders = getAllOrders();
            const separator = ";";

            const header = [
                "order_id","created_at","user_id","first_name","last_name","username",
                "phone","address","item_id","category","item_name","price","qty",
                "line_total","order_total","status"
            ];

            const rows = [header.join(separator)];

            orders.forEach(order => {
                order.items.forEach(item => {
                    rows.push([
                        escapeCSV(order.order_id),
                        escapeCSV(order.created_at),
                        escapeCSV(order.user.id),
                        escapeCSV(order.user.first_name),
                        escapeCSV(order.user.last_name),
                        escapeCSV(order.user.username),
                        escapeCSV(order.phone),
                        escapeCSV(order.address),
                        escapeCSV(item.id),
                        escapeCSV(item.cat),
                        escapeCSV(item.name),
                        escapeCSV(item.price),
                        escapeCSV(item.qty),
                        escapeCSV(item.price * item.qty),
                        escapeCSV(order.total),
                        escapeCSV(order.status_text || order.status)
                    ].join(separator));
                });
            });

            return "\uFEFF" + rows.join("\n");
        }

        function makeCSVBlob(csvContent) {
            return new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        }

        function downloadCSVFile(csvContent, filename) {
            const blob = makeCSVBlob(csvContent);
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        async function apiPost(path, payload, isFormData = false) {
            const options = {
                method: "POST",
                headers: {},
                body: payload
            };

            if (!isFormData) {
                options.headers["Content-Type"] = "application/json";
                options.body = JSON.stringify(payload);
            }

            const response = await fetch(`${BACKEND_URL}${path}`, options);

            const rawText = await response.text();
            let parsed = null;

            if (rawText) {
                try {
                    parsed = JSON.parse(rawText);
                } catch {
                    parsed = rawText;
                }
            }

            if (!response.ok) {
                throw new Error(typeof parsed === "string" ? parsed : JSON.stringify(parsed));
            }

            return parsed;
        }

        function renderProfile() {
            const user = currentUser;
            if (!user) return;

            document.getElementById("user-name").innerText = getUserDisplayName(user);
            document.getElementById("user-id").innerText = getUserTag(user);

            const avatarEl = document.getElementById("avatar");
            if (user.photo_url) {
                avatarEl.innerHTML = `<img src="${escapeHTML(user.photo_url)}" alt="avatar">`;
            } else {
                avatarEl.textContent = (user.first_name || "?").charAt(0).toUpperCase();
            }

            document.getElementById("user-status").innerText = "MAX Premium Guest";
            document.getElementById("user-extra").innerText = "";
        }

        function renderCats() {
            const cats = ["Все", ...new Set(PRODUCTS.map(p => p.cat))];
            document.getElementById("cat-nav").innerHTML = cats.map(c => `
                <div class="cat-btn ${c === currentCat ? "active" : ""}" onclick="setCat('${String(c).replace(/'/g, "\\'")}')">${c}</div>
            `).join("");
        }

        function setCat(c) {
            currentCat = c;
            renderCats();
            renderProducts();
        }

        function openProductModal(id) {
            const product = PRODUCTS.find(x => x.id === id);
            if (!product) return;
            currentModalProductId = id;

            document.getElementById("modal-title").innerText = product.name;
            document.getElementById("modal-pack").innerText = product.pack || "";
            document.getElementById("modal-price").innerText = `${product.price} ₽`;
            document.getElementById("modal-desc").innerText = product.desc || "";
            document.getElementById("modal-kbju").innerText = product.kbju || "";
            document.getElementById("modal-add-btn").onclick = () => {
                addToCart(product.id);
                forceCloseModal();
            };

            document.getElementById("product-modal").classList.add("active");
        }

        function closeProductModal(event) {
            if (event.target.id === "product-modal") {
                forceCloseModal();
            }
        }

        function forceCloseModal() {
            currentModalProductId = null;
            document.getElementById("product-modal").classList.remove("active");
        }

        function renderProducts() {
            const grid = document.getElementById("product-grid");
            const filtered = currentCat === "Все" ? PRODUCTS : PRODUCTS.filter(p => p.cat === currentCat);

            grid.innerHTML = filtered.map(p => `
                <div class="card" onclick="openProductModal(${p.id})">
                    <img src="${escapeHTML(categoryImage(p.cat))}" class="p-img" loading="lazy" alt="${escapeHTML(p.name)}">
                    <div class="p-name serif">${escapeHTML(p.name)}</div>
                    <div class="p-pack">${escapeHTML(p.pack || "")}</div>
                    <div class="p-desc">${escapeHTML(p.desc || "")}</div>
                    <div class="p-price">${p.price} ₽</div>
                    <div class="card-actions">
                        <button class="more-btn" onclick="event.stopPropagation(); openProductModal(${p.id})">Подробнее</button>
                        <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">В корзину</button>
                    </div>
                </div>
            `).join("");
        }

        function addToCart(id) {
            const p = PRODUCTS.find(x => x.id === id);
            if (!p) return;

            const item = cart.find(x => x.id === id);
            if (item) item.qty++;
            else cart.push({ ...p, img: categoryImage(p.cat), qty: 1 });

            safeImpact("medium");
            updateCartUI();
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.id === id);
            if (!item) return;

            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(x => x.id !== id);

            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem(STORAGE_CART_KEY, JSON.stringify(cart));

            const list = document.getElementById("cart-list");
            const count = cart.reduce((s, i) => s + i.qty, 0);

            const badge = document.getElementById("cart-badge");
            badge.innerText = count;
            badge.style.display = count > 0 ? "block" : "none";

            if (cart.length > 0) {
                document.getElementById("cart-empty").style.display = "none";
                document.getElementById("checkout-block").style.display = "block";

                list.innerHTML = cart.map(i => `
                    <div class="cart-item">
                        <img src="${escapeHTML(i.img)}" class="cart-img" alt="${escapeHTML(i.name)}">
                        <div class="cart-info" style="flex:1;">
                            <h4 class="serif" style="margin:0 0 6px;">${escapeHTML(i.name)}</h4>
                            <div style="font-size:11px; opacity:0.7; margin-bottom:4px;">${escapeHTML(i.pack || "")}</div>
                            <div style="font-weight:600;">${i.price} ₽</div>
                        </div>
                        <div class="cart-ctrl">
                            <button class="qty-btn" onclick="changeQty(${i.id}, -1)">-</button>
                            <span style="font-weight:600;">${i.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                        </div>
                    </div>
                `).join("");
            } else {
                document.getElementById("cart-empty").style.display = "block";
                document.getElementById("checkout-block").style.display = "none";
                list.innerHTML = "";
            }
        }

        function saveOrderLocally(order) {
            const userOrders = getUserOrders(order.user.id);
            userOrders.unshift(order);
            setUserOrders(order.user.id, userOrders);

            const allOrders = getAllOrders();
            allOrders.unshift(order);
            setAllOrders(allOrders);
        }

        function renderOrderHistory() {
            if (!currentUser) return;

            const orders = getUserOrders(currentUser.id);
            const list = document.getElementById("orders-history-list");
            const empty = document.getElementById("orders-history-empty");

            if (!orders.length) {
                empty.style.display = "block";
                list.innerHTML = "";
                return;
            }

            empty.style.display = "none";
            list.innerHTML = orders.map(order => `
                <div class="history-card">
                    <div class="history-top">
                        <div>
                            <div class="history-id">${escapeHTML(order.order_id)}</div>
                            <div class="history-date">${formatDate(order.created_at)}</div>
                        </div>
                        <div class="history-total">${order.total} ₽</div>
                    </div>
                    <div style="font-size:12px; line-height:1.5;">
                        ${order.items.map(i => `• ${escapeHTML(i.name)} x ${i.qty}`).join("<br>")}
                    </div>
                    <div class="history-status">${escapeHTML(order.status_text || "Отправлен")}</div>
                </div>
            `).join("");
        }

        function buildOrderObject(phone, address) {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            return {
                order_id: generateOrderId(),
                created_at: new Date().toISOString(),
                phone: phone.trim(),
                address: address.trim(),
                total,
                status: "sent_to_admin",
                status_text: "Отправлен",
                user: {
                    id: currentUser.id,
                    first_name: currentUser.first_name,
                    last_name: currentUser.last_name,
                    username: currentUser.username,
                    photo_url: currentUser.photo_url
                },
                items: cart.map(i => ({
                    id: i.id,
                    cat: i.cat,
                    name: i.name,
                    price: i.price,
                    qty: i.qty,
                    img: i.img,
                    pack: i.pack || ""
                }))
            };
        }

        async function finalizeOrder() {
            const phone = document.getElementById("f-phone").value.trim();
            const address = document.getElementById("f-address").value.trim();

            if (!phone || !address) {
                safeNotify("warning");
                return showAlert("Укажите телефон и адрес для связи");
            }

            if (!cart.length) {
                safeNotify("warning");
                return showAlert("Корзина пуста");
            }

            const order = buildOrderObject(phone, address);

            try {
                const result = await apiPost("/api/orders/create", {
                    order,
                    initData: app?.initData || "",
                    initDataUnsafe: app?.initDataUnsafe || null
                });

                logDebug("Заказ отправлен", result);

                saveOrderLocally(order);
                renderOrderHistory();
                safeNotify("success");

                cart = [];
                localStorage.setItem(STORAGE_CART_KEY, JSON.stringify(cart));
                updateCartUI();
                switchTab("shop-view", document.querySelector(".nav-item"));
                showAlert("Заказ успешно оформлен");
            } catch (e) {
                console.error("SEND ORDER FAILED:", e);
                logDebug("Ошибка отправки заказа", { error: e.message });
                safeNotify("error");
                showAlert("Заказ не отправлен.\n\n" + e.message);
            }
        }

        async function sendCsvToAdmin() {
            const orders = getAllOrders();
            if (!orders.length) {
                return showAlert("Нет данных для выгрузки");
            }

            try {
                const csv = buildOrdersCSV();
                const blob = makeCSVBlob(csv);
                const filename = `max_orders_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}.csv`;

                const formData = new FormData();
                formData.append("file", blob, filename);
                formData.append("caption", `CSV выгрузка заказов от ${formatDate(new Date().toISOString())}`);

                const result = await apiPost("/api/orders/export-csv", formData, true);
                logDebug("CSV отправлен админу", result);

                safeNotify("success");
                showAlert("CSV отправлен администратору");
            } catch (e) {
                console.error("SEND CSV FAILED:", e);
                logDebug("Ошибка отправки CSV", { error: e.message });
                safeNotify("error");
                showAlert("CSV не отправлен.\n\n" + e.message);
            }
        }

        function exportOrdersCSV() {
            const orders = getAllOrders();
            if (!orders.length) {
                return showAlert("Нет данных для выгрузки");
            }

            const csv = buildOrdersCSV();
            const filename = `max_orders_${new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-")}.csv`;
            downloadCSVFile(csv, filename);
        }

        function switchTab(id, el) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));

            const target = document.getElementById(id);
            if (target) target.classList.add("active");
            if (el) el.classList.add("active");

            if (id === "profile-view") {
                renderProfile();
                renderOrderHistory();
            }

            safeSelection();
        }

        function preloadCheckoutData() {
            if (!currentUser) return;

            const orders = getUserOrders(currentUser.id);
            if (orders.length) {
                const lastOrder = orders[0];
                if (lastOrder.phone) document.getElementById("f-phone").value = lastOrder.phone;
                if (lastOrder.address) document.getElementById("f-address").value = lastOrder.address;
            }
        }

        function init() {
            currentUser = getUserFromMaxWebApp();
            saveUserProfile(currentUser);

            renderProfile();
            renderCats();
            renderProducts();
            updateCartUI();
            renderOrderHistory();
            preloadCheckoutData();
        }

        init();
    </script>
</body>
</html>
